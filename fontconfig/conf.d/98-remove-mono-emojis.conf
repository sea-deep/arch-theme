<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Strip emojis from JetBrains Mono to prevent monochrome fallback hijacking -->
  <match target="scan">
    <test name="family" compare="contains"><string>JetBrains</string></test>
    <edit name="charset" mode="assign" binding="same">
      <minus>
        <name>charset</name>
        <charset>
          <range><int>0x1f600</int><int>0x1f64f</int></range>
          <range><int>0x1f300</int><int>0x1f5ff</int></range>
          <range><int>0x1f680</int><int>0x1f6ff</int></range>
          <range><int>0x2600</int><int>0x26ff</int></range>
          <range><int>0x2700</int><int>0x27bf</int></range>
          <range><int>0x1f900</int><int>0x1f9ff</int></range>
        </charset>
      </minus>
    </edit>
  </match>
  
  <!-- Strip emojis from all Nerd Fonts -->
  <match target="scan">
    <test name="family" compare="contains"><string>Nerd</string></test>
    <edit name="charset" mode="assign" binding="same">
      <minus>
        <name>charset</name>
        <charset>
          <range><int>0x1f600</int><int>0x1f64f</int></range>
          <range><int>0x1f300</int><int>0x1f5ff</int></range>
          <range><int>0x1f680</int><int>0x1f6ff</int></range>
          <range><int>0x2600</int><int>0x26ff</int></range>
          <range><int>0x2700</int><int>0x27bf</int></range>
          <range><int>0x1f900</int><int>0x1f9ff</int></range>
        </charset>
      </minus>
    </edit>
  </match>
</fontconfig>

<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>Noto Color Emoji</string></patelt>
      </pattern>
      <pattern>
        <patelt name="family"><string>Twemoji</string></patelt>
      </pattern>
      <pattern>
        <patelt name="family"><string>Twitter Color Emoji</string></patelt>
      </pattern>

      <pattern>
        <patelt name="family"><string>Android Emoji</string></patelt>
      </pattern>
    </rejectfont>
  </selectfont>
</fontconfig>

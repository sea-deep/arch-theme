<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <alias>
    <family>serif</family>
    <prefer><family>IBM Plex Serif SmBld</family></prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer><family>IBM Plex Sans SmBld</family></prefer>
  </alias>
  <alias>
    <family>sans</family>
    <prefer><family>IBM Plex Sans SmBld</family></prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer><family>FiraCode Nerd Font</family></prefer>
  </alias>
</fontconfig>

<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <alias>
    <family>serif</family>
    <prefer><family>IBM Plex Serif</family></prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer><family>IBM Plex Sans</family></prefer>
  </alias>
  <alias>
    <family>sans</family>
    <prefer><family>IBM Plex Sans</family></prefer>
  </alias>

  <!-- Make IBM Plex Sans default to SemiBold weight -->
  <match target="pattern">
    <test qual="any" name="family"><string>IBM Plex Sans</string></test>
    <edit name="weight" mode="append" binding="strong"><const>semibold</const></edit>
  </match>

  <alias>
    <family>monospace</family>
    <prefer><family>FiraCode Nerd Font</family></prefer>
  </alias>
</fontconfig>

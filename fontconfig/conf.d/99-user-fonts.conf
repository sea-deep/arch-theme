<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <alias>
    <family>serif</family>
    <prefer><family>IBM Plex Serif</family></prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer><family>IBM Plex Sans</family></prefer>
  </alias>
  <alias>
    <family>sans</family>
    <prefer><family>IBM Plex Sans</family></prefer>
  </alias>

  <!-- Make IBM Plex Sans default to SemiBold weight, but don't override if explicitly asked for bold or bolder -->
  <match target="pattern">
    <test qual="any" name="family"><string>IBM Plex Sans</string></test>
    <!-- 100 is Medium, 80 is Regular. So if weight is less than 105, we boost it to semibold (180) -->
    <test name="weight" compare="less_eq"><int>105</int></test>
    <edit name="weight" mode="assign" binding="strong"><const>semibold</const></edit>
  </match>

  <alias>
    <family>monospace</family>
    <prefer><family>FiraCode Nerd Font</family></prefer>
  </alias>
</fontconfig>

# --- MIKU DARK MODE KITTY CONFIG ---

# 1. Fonts & Scaling
# Since you prefer a larger scale, I set this to 13pt. 
# You can increase it to 14 or 15 if it's still too small.
font_family      family="FiraCode Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# 2. Window Layout
# Adds some breathing room around the text
window_padding_width 12
confirm_os_window_close 0
hide_window_decorations yes

# 3. Transparency
# Matches the "clean/modern" vibe of your Waybar
background_opacity 0.95

# Miku Teal & Deep Charcoal Palette
background #1a1b26
foreground #c0caf5
cursor #39c5bb
cursor_text_color #1a1b26
selection_background #39c5bb
selection_foreground #1a1b26
color0 #1a1b26
color8 #414868
color1 #f7768e
color9 #f7768e
color2 #39c5bb
color10 #39c5bb
color3 #e0af68
color11 #e0af68
color4 #7aa2f7
color12 #7aa2f7
color5 #bb9af7
color13 #bb9af7
color6 #7dcfff
color14 #7dcfff
color7 #a9b1d6
color15 #c0caf5
